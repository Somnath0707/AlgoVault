server:
  port: 8080
  tomcat:
    max-http-form-post-size: 50MB

app:
  auth:
    # AlgoVault is a local, single-person companion. The extension creates a
    # local session for the LeetCode account currently being synced.
    mode: single-user

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/algovault}
    username: ${SPRING_DATASOURCE_USERNAME:algovault}
    password: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy}

jwt:
  secret: ${JWT_SECRET:?Set JWT_SECRET to a random value of at least 32 bytes}
  expiration: 86400000

cors:
  # Comma-separated exact origins, for example chrome-extension://<your-extension-id>.
  # Do not use wildcard extension origins: any installed extension could otherwise call the API.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    root: INFO
    com.algovault: DEBUG
