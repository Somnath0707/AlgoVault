version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: algovault
      POSTGRES_USER: algovault
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/algovault
      SPRING_DATASOURCE_USERNAME: algovault
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD in .env}
      SPRING_REDIS_HOST: redis
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dummy}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dummy}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS to your extension origin in .env}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
